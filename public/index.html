<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Heru Rusdianto">

    <link rel="stylesheet" href="style.css">

    <meta name="description" content="CSV Generator Tool - Generate CSV data with custom columns, separators, and data types"/>
    <meta name="theme-color" content="#5755d9"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
    <meta name="apple-mobile-web-app-title" content="CSV Generator"/>
    <meta name="msapplication-TileColor" content="#5755d9">
    <meta name="msapplication-TileImage" content="icons/ms-icon-144x144.png">

    <title>CSV Generator</title>
</head>
<body>
    <div class="topbar">
        <a href="https://github.com/herusdianto/csv-gen" class="github-link" target="_blank" rel="noopener noreferrer" title="GitHub Repository">
            <svg class="github-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="28" height="28">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.48 2 2 6.58 2 12.26c0 4.5 2.87 8.32 6.84 9.67.5.09.68-.22.68-.48 0-.24-.01-.87-.01-1.7-2.78.62-3.37-1.36-3.37-1.36-.45-1.18-1.1-1.5-1.1-1.5-.9-.63.07-.62.07-.62 1 .07 1.53 1.06 1.53 1.06.89 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.37-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.7 0 0 .84-.28 2.75 1.05A9.36 9.36 0 0112 7.07c.85.004 1.71.12 2.51.35 1.91-1.33 2.75-1.05 2.75-1.05.55 1.4.2 2.44.1 2.7.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.07.36.32.68.94.68 1.9 0 1.37-.01 2.47-.01 2.81 0 .27.18.58.69.48A10.01 10.01 0 0022 12.26C22 6.58 17.52 2 12 2z" fill="currentColor"/>
            </svg>
        </a>
        <div class="theme-toggle">
            <button id="theme-switch" aria-label="Toggle dark/light mode" class="theme-toggle-btn">
                <span id="theme-icon"></span>
            </button>
        </div>
    </div>

    <header>
        <h1>CSV Generator</h1>
        <p>Generate CSV data with custom columns and data types</p>
        <p class="client-side-note"><strong>100% Client-side:</strong> All processing is done in your browser. <u>No data is sent to any server.</u></p>
    </header>

    <div class="container">
        <!-- Settings Section -->
        <div class="settings-section">
            <h2>Settings</h2>
            <div class="settings-grid">
                <div class="setting-item">
                    <label class="form-label" for="rowCount">Number of Rows</label>
                    <input type="number" class="form-input" id="rowCount" value="10" min="1" max="10000">
                </div>
                <div class="setting-item">
                    <label class="form-label" for="separator">Separator</label>
                    <select class="form-input" id="separator">
                        <option value=",">Comma (,)</option>
                        <option value=";">Semicolon (;)</option>
                        <option value="&#9;">Tab</option>
                        <option value="|">Pipe (|)</option>
                        <option value="custom">Custom</option>
                    </select>
                    <input type="text" class="form-input" id="customSeparator" placeholder="Custom separator" style="display:none; margin-top:8px;" maxlength="3">
                </div>
                <div class="setting-item">
                    <label class="form-label">Include Header</label>
                    <div class="toggle-switch">
                        <input type="checkbox" id="includeHeader" checked>
                        <label for="includeHeader" class="toggle-label">
                            <span class="toggle-inner"></span>
                            <span class="toggle-switch-slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Columns Section -->
        <div class="columns-section">
            <div class="section-header">
                <h2>Columns</h2>
                <button type="button" class="btn btn-add" onclick="addColumn()">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Add Column
                </button>
            </div>
            <div id="columnsContainer">
                <!-- Columns will be added here dynamically -->
            </div>
        </div>

        <!-- Generate Button -->
        <div class="btn-group btn-group-block">
            <button class="btn btn-lg btn-primary" type="button" onclick="generateCSV()">Generate CSV</button>
        </div>

        <!-- Output Section -->
        <div class="form-group">
            <label class="form-label" for="output">Output</label>
            <div class="control">
                <textarea class="form-input" placeholder="Generated CSV will appear here..." id="output" rows="12" readonly></textarea>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="btn-group btn-group-block action-buttons">
            <button class="btn btn-lg" type="button" onclick="copyOutput()" id="copyButton">Copy</button>
            <button class="btn btn-lg btn-secondary" type="button" onclick="downloadCSV()">Download CSV</button>
        </div>
    </div>

    <footer>
        <p>Made with AI by <a href="https://herusdianto.github.io/" target="_blank" rel="noopener noreferrer">Heru Rusdianto</a></p>
        <p class="copyright">
            © <span id="currentYear"></span> All rights reserved.
        </p>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
